name: nightly-mutants

# Non-gating nightly mutation-testing report (cargo-mutants).
#
# Purpose: prove the camouflage/crypto oracles are NOT self-referential by
# showing that the indistinguishability + auth tests actually KILL byte-flip
# and label-swap mutants. Scoped to the two highest-signal files:
#   - src/tls/safari26.rs  (Safari 2.6 TLS fingerprint / ClientHello shape)
#   - src/crypto/auth.rs   (handshake auth / MAC verification)
#
# This workflow is informational only: `continue-on-error: true` and no
# branch protection references it, so surviving mutants NEVER block a PR.
# Each night tests ONE of 8 rolling shards (full surface every 8 days); read its
# survivors in the uploaded `mutants-out-shard-N` artifact (outcomes.json /
# mutants.out/*.txt): a MISSED mutant is a code change no test caught and is
# a candidate for a new/strengthened test. Most config lives in .cargo/mutants.toml.

on:
  schedule:
    # Off-peak; deliberately avoids minute 0/30 to dodge cron stampede.
    - cron: '17 4 * * *'
  workflow_dispatch:
    # Manual sweeps over a broader module than the nightly's 2-file scope.
    # When `module` is anything other than `nightly`, the run mutates every file
    # under that module's `src/<module>/` glob (still `--lib`-scoped tests) and
    # shards by `shard_total` so each job stays under GitHub's 6h cap. Leaving the
    # defaults reproduces the original nightly behaviour exactly.
    inputs:
      module:
        description: 'Module to sweep (nightly = original 2-file scope)'
        type: choice
        default: nightly
        options:
          - nightly
          - crypto
          - fingerprint
          - handshake
          - protocol
          - transport
      shard_index:
        description: 'Shard index for this run (0-based; ignored when module=nightly)'
        type: string
        default: '0'
      shard_total:
        # Default 8 keeps each shard well under the 75-min job cap. The nightly is
        # tuned to ~60 mutants/shard; a large module (crypto ~440, protocol ~890,
        # transport ~1650 mutants) split only 4 ways runs ~200 mutants/shard, which
        # approaches the cap and -- because this job is continue-on-error -- a
        # timeout-kill would silently upload a PARTIAL mutants.out. Raise this for
        # the largest modules (e.g. transport: 16) rather than lower it.
        description: 'Total shards (ignored when module=nightly). Raise for big modules; do not lower below 8.'
        type: string
        default: '8'

# Least-privilege: only needs to read the repo to build/mutate/test.
permissions:
  contents: read

# Cancel an in-flight run only when a NEWER run of the SAME (ref, module, shard)
# starts. The module+shard suffix is essential for the manual fan-out: dispatching
# many module sweeps on one branch must NOT cancel each other (a bare ref-only
# group made every dispatch cancel the previous, leaving only the last alive).
# For the scheduled nightly the inputs are empty, so the group collapses back to
# the per-ref behaviour (re-dispatch supersedes an in-flight nightly).
concurrency:
  group: nightly-mutants-${{ github.ref }}-${{ github.event.inputs.module || 'nightly' }}-${{ github.event.inputs.shard_index || '0' }}-${{ github.event.inputs.shard_total || '8' }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  CARGO_NET_RETRY: 10
  RUSTUP_MAX_RETRIES: 10
  # The per-mutant cost on the 4-vCPU runner is the lib REBUILD, not the test.
  # Drop debuginfo (tests don't need it) to shave that rebuild; nothing here
  # relies on symbols/backtraces.
  CARGO_PROFILE_DEV_DEBUG: "0"
  # ~480 in-place rebuilds in one target dir; turning incremental off keeps the
  # target from accreting a stale incremental session per mutant (bounded size,
  # smaller rustc footprint). Each mutant recompiles most of the crate anyway, so
  # the build-time cost is small.
  CARGO_INCREMENTAL: "0"

jobs:
  mutants:
    name: cargo-mutants (indistinguishability/crypto surface)
    runs-on: ubuntu-latest
    # One rolling shard per night (see the run step): ~60 mutants at ~50s each on
    # the 4-vCPU runner -- the per-mutant cost is the lib REBUILD (~40s), not the
    # scoped test (~8s). One-at-a-time (in-place) a shard finishes in ~25-50 min,
    # so this cap is a backstop. We shard because the full 479-mutant suite needs
    # ~6h here -- over GitHub's 6h job limit, and what made this job SIGKILL at
    # timeout-minutes every night before sharding.
    timeout-minutes: 75
    # NON-GATING: this report must never fail a PR or the nightly schedule.
    continue-on-error: true
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        with:
          toolchain: stable

      - name: Cache cargo registry and target/
        uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
        with:
          shared-key: parallax-ci
          # Nightly mutation builds are unusual; never write back to the shared cache.
          save-if: false

      - name: Install cargo-mutants
        uses: taiki-e/install-action@43aecc8d72668fbcfe75c31400bc4f890f1c5853 # v2.83.2
        with:
          tool: cargo-mutants@27.1.0

      - name: Run cargo-mutants (scoped, one rolling shard)
        # WHY sharded: on the 4-vCPU runner each mutant costs ~50s (a ~40s lib
        # rebuild + ~8s scoped test), so all 479 mutants would need ~6h -- over
        # GitHub's 6h job limit. Instead we test one of 8 shards per night,
        # rotating by day-of-year, so the whole surface is covered every 8 days.
        # Each shard is ~60 mutants. 10# forces base-10 so a zero-padded day
        # (e.g. 008) is not parsed as octal.
        #
        # WHY ulimit: some mutants turn a size/length calc into a blow-up -- e.g.
        # `tap_records` `total += len` -> `total *= len` -- so the mutated code
        # asks for ~16 GB and OOM-killed the whole runner ("received a shutdown
        # signal"), which is what killed this job ~14 min in regardless of disk.
        # Capping address space makes that allocation fail inside the test process
        # (-> the mutant is caught) instead of taking down the runner. --in-place
        # runs one mutant at a time (no per-job tree copy), so a single 12 GB-capped
        # process stays well under the 16 GB runner; the ephemeral CI checkout
        # makes mutating then restoring the tree safe.
        #
        # Scope, the per-mutant test set (--lib + the fingerprint/auth oracles),
        # the per-mutant timeout, and --locked live in .cargo/mutants.toml; we pass
        # --config explicitly for clarity. Do NOT add a CLI --timeout (it would
        # override the baseline-relative config timeout). --no-shuffle makes each
        # shard a fixed, reproducible partition.
        #
        # MANUAL MODULE SWEEP (workflow_dispatch with module != nightly): mutate
        # every file under src/<module>/** instead of the 2 nightly files, sharded
        # by the dispatched shard_index/shard_total. The per-mutant test scope
        # (--lib + oracles) still comes from .cargo/mutants.toml, so the slow
        # liveness/relay integration tests stay excluded (no hangs). The -f glob
        # below overrides the config's examine_globs (CLI wins).
        env:
          MUT_MODULE: ${{ github.event.inputs.module || 'nightly' }}
          MUT_SHARD_INDEX: ${{ github.event.inputs.shard_index || '0' }}
          MUT_SHARD_TOTAL: ${{ github.event.inputs.shard_total || '8' }}
        run: |
          ulimit -v 12582912   # 12 GiB address-space cap per process
          if [ "$MUT_MODULE" = "nightly" ]; then
            shard=$(( 10#$(date -u +%j) % 8 ))
            echo "MUT_SHARD=$shard" >> "$GITHUB_ENV"
            echo "Testing mutation shard $shard/8 (rotates daily; full surface every 8 days)"
            cargo mutants \
              --config .cargo/mutants.toml \
              --in-place \
              --no-shuffle \
              --shard "$shard/8" \
              -f src/tls/safari26.rs \
              -f src/crypto/auth.rs
          else
            echo "MUT_SHARD=${MUT_MODULE}-${MUT_SHARD_INDEX}of${MUT_SHARD_TOTAL}" >> "$GITHUB_ENV"
            echo "Sweeping module src/${MUT_MODULE}/** shard ${MUT_SHARD_INDEX}/${MUT_SHARD_TOTAL}"
            cargo mutants \
              --config .cargo/mutants.toml \
              --in-place \
              --no-shuffle \
              --shard "${MUT_SHARD_INDEX}/${MUT_SHARD_TOTAL}" \
              -f "src/${MUT_MODULE}/**"
          fi

      - name: Upload mutants.out report
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          # One artifact per shard so a manual re-run of a different day's shard
          # does not clobber the previous one.
          name: mutants-out-shard-${{ env.MUT_SHARD }}
          path: mutants.out/
          if-no-files-found: warn
          retention-days: 14
