name: nightly-mutants

# Non-gating nightly mutation-testing report (cargo-mutants).
#
# Purpose: prove the camouflage/crypto oracles are NOT self-referential by
# showing that the indistinguishability + auth tests actually KILL byte-flip
# and label-swap mutants. Scoped to the two highest-signal files:
#   - src/tls/safari26.rs  (Safari 2.6 TLS fingerprint / ClientHello shape)
#   - src/crypto/auth.rs   (handshake auth / MAC verification)
#
# This workflow is informational only: `continue-on-error: true` and no
# branch protection references it, so surviving mutants NEVER block a PR.
# Each night tests ONE of 8 rolling shards (full surface every 8 days); read its
# survivors in the uploaded `mutants-out-shard-N` artifact (outcomes.json /
# mutants.out/*.txt): a MISSED mutant is a code change no test caught and is
# a candidate for a new/strengthened test. Most config lives in .cargo/mutants.toml.

on:
  schedule:
    # Off-peak; deliberately avoids minute 0/30 to dodge cron stampede.
    - cron: '17 4 * * *'
  workflow_dispatch:

# Least-privilege: only needs to read the repo to build/mutate/test.
permissions:
  contents: read

# Cancel an in-flight nightly run if a newer one starts (e.g. manual dispatch).
concurrency:
  group: nightly-mutants-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  CARGO_NET_RETRY: 10
  RUSTUP_MAX_RETRIES: 10
  # The per-mutant cost on the 4-vCPU runner is the lib REBUILD, not the test.
  # Drop debuginfo (tests don't need it) to shave that rebuild; nothing here
  # relies on symbols/backtraces.
  CARGO_PROFILE_DEV_DEBUG: "0"

jobs:
  mutants:
    name: cargo-mutants (indistinguishability/crypto surface)
    runs-on: ubuntu-latest
    # One rolling shard per night (see the run step): ~60 mutants at ~50s each on
    # the 4-vCPU runner -- the per-mutant cost is the lib REBUILD (~40s), not the
    # scoped test (~8s). Run in-place at one-at-a-time, a shard finishes in
    # ~45-55 min, so this cap is a backstop. We shard because the full 479-mutant
    # suite needs ~6h here -- over GitHub's 6h job limit, and what made this job
    # SIGKILL at timeout-minutes every night.
    timeout-minutes: 75
    # NON-GATING: this report must never fail a PR or the nightly schedule.
    continue-on-error: true
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          persist-credentials: false

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        with:
          toolchain: stable

      - name: Cache cargo registry and target/
        uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
        with:
          shared-key: parallax-ci
          # Nightly mutation builds are unusual; never write back to the shared cache.
          save-if: false

      - name: Install cargo-mutants
        uses: taiki-e/install-action@b8cecb83565409bcc297b2df6e77f030b2a468d5 # v2
        with:
          tool: cargo-mutants@27.1.0

      - name: Run cargo-mutants (scoped, one rolling shard)
        # WHY sharded: on the 4-vCPU runner each mutant costs ~50s (a ~40s lib
        # rebuild + ~8s scoped test), so all 479 mutants would need ~5h -- over
        # GitHub's 6h job limit. Instead we test one of 8 shards per night,
        # rotating by day-of-year, so the whole surface is covered every 8 days.
        # Each shard is ~60 mutants (~45-55 min). 10# forces base-10 so a
        # zero-padded day (e.g. 008) is not parsed as octal.
        #
        # Scope, the per-mutant test set (--lib + the fingerprint/auth oracles),
        # the per-mutant timeout, and --locked all live in .cargo/mutants.toml; we
        # pass --config explicitly for clarity. Do NOT add a CLI --timeout -- it
        # would override the baseline-relative config timeout. --no-shuffle makes
        # each shard a fixed, reproducible partition.
        #
        # --in-place: mutate the checked-out tree directly instead of copying it to
        # a per-job scratch dir. cargo-mutants' default copy mode duplicates the
        # whole tree (incl. the ~9 GB fuzz/ workspace) plus a build cache per job,
        # which filled the runner's ~14 GB disk mid-run and got it SIGKILLed
        # ("runner received a shutdown signal"). In-place reuses one target dir
        # (it implies --jobs 1); the ephemeral CI checkout makes mutating then
        # restoring the tree safe.
        run: |
          shard=$(( 10#$(date -u +%j) % 8 ))
          echo "MUT_SHARD=$shard" >> "$GITHUB_ENV"
          echo "Testing mutation shard $shard/8 (rotates daily; full surface every 8 days)"
          cargo mutants \
            --config .cargo/mutants.toml \
            --in-place \
            --no-shuffle \
            --shard "$shard/8" \
            -f src/tls/safari26.rs \
            -f src/crypto/auth.rs

      - name: Upload mutants.out report
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          # One artifact per shard so a manual re-run of a different day's shard
          # does not clobber the previous one.
          name: mutants-out-shard-${{ env.MUT_SHARD }}
          path: mutants.out/
          if-no-files-found: warn
          retention-days: 14
