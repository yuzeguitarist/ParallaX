name: ci-quick

# Fast feedback on every push to a feature branch.
# Heavier checks (clippy, full tests, gfw_sim) run only in the PR workflow.

on:
  push:
    branches-ignore:
      - main
      - master
      - 'claude/**'   # Claude's PR branches get the PR's full CI; skip the redundant quick run
    paths-ignore:
      - '**.md'
      - 'ParallaX-DeepWiki/**'
      - 'DEPLOYMENT.md'
      - 'AGENTS.md'
      - 'README.md'
      - '.gitignore'
      - 'LICENSE*'
  workflow_dispatch:

# Least-privilege default token: these jobs only read the repo to build/test.
permissions:
  contents: read

# Cancel any in-flight run on the same branch when a new commit is pushed.
concurrency:
  group: ci-quick-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  CARGO_INCREMENTAL: 0
  CARGO_NET_RETRY: 10
  RUSTUP_MAX_RETRIES: 10

jobs:
  quick:
    name: fmt + check + unit tests
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        with:
          toolchain: stable
          components: rustfmt

      - name: Cache cargo registry and target/
        uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
        with:
          shared-key: parallax-ci
          save-if: ${{ github.ref == 'refs/heads/main' }}

      - name: cargo fmt --check
        run: cargo fmt --all -- --check

      - name: cargo check
        run: cargo check --all-targets --locked

      - name: cargo test --lib --bins (unit tests only)
        run: cargo test --lib --bins --locked --no-fail-fast
