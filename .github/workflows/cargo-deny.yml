name: cargo-deny

# Deterministic supply-chain gate: RustSec advisories, license policy, banned /
# duplicate crates, and a crates.io source allow-list — all configured in
# deny.toml (curated against the locked tree). Complements the heuristic
# claude-dependency-audit with a fast, deterministic check.
#
# Runs on PRs/pushes that touch the dependency manifests or deny.toml, plus a
# weekly schedule so newly-published advisories against UNCHANGED deps are caught
# in between dependency changes.

on:
  pull_request:
    paths: [Cargo.toml, Cargo.lock, deny.toml]
  push:
    branches: [main, master]
    paths: [Cargo.toml, Cargo.lock, deny.toml]
  schedule:
    - cron: '43 6 * * 1'   # Mondays 06:43 UTC (off-peak, off the :00/:30 stampede)
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: cargo-deny-${{ github.ref }}
  cancel-in-progress: true

jobs:
  cargo-deny:
    name: cargo deny check
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          persist-credentials: false
      # Prebuilt cargo-deny binary (no compile). Runs `cargo deny check` = all of
      # advisories + bans + licenses + sources against deny.toml.
      - uses: EmbarkStudios/cargo-deny-action@bb137d7af7e4fb67e5f82a49c4fce4fad40782fe # v2.0.20
        with:
          command: check
