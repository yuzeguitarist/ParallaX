name: semgrep

# Pattern-based static analysis (Semgrep OSS) over the Rust sources. This overlaps
# with CodeQL by design and is kept narrow to the `p/rust` ruleset to avoid
# duplicating the secret-scanning (gitleaks) and Actions-audit (zizmor) coverage.
# Findings upload to the Security tab as SARIF and are NON-blocking — Semgrep's
# Rust ruleset is small, so this is a supplementary lens, not a gate.
#
# Semgrep is installed into a throwaway venv at a pinned version. NOTE: this pin is
# maintained BY HAND — Dependabot's github-actions ecosystem does not track a pip
# package (it is not a `uses:` action), so bump the version below when desired.

on:
  pull_request:
    branches: [main, master]
    paths-ignore: ['**.md', 'ParallaX-DeepWiki/**']
  push:
    branches: [main, master]
    paths-ignore: ['**.md', 'ParallaX-DeepWiki/**']
  schedule:
    - cron: '29 5 * * 1'   # weekly (Mon 05:29 UTC)
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: semgrep-${{ github.ref }}
  cancel-in-progress: true

jobs:
  semgrep:
    name: semgrep
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read
      security-events: write   # upload SARIF to code scanning
    steps:
      - uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      # --error is omitted so findings do not fail the job.
      - name: Run Semgrep (p/rust) -> SARIF
        run: |
          python3 -m venv /tmp/sg
          /tmp/sg/bin/pip install --quiet semgrep==1.167.0
          # rust.lang.security.unsafe-usage is a blanket "you used `unsafe`" advisory
          # (note severity) that matches every `unsafe` keyword with no dataflow
          # analysis. This project's libc FFI (e.g. the QUIC GSO/GRO offload) is
          # required, audited, and carries SAFETY comments, so the rule is pure noise
          # here — exclude just that one rule, keeping the rest of p/rust active.
          /tmp/sg/bin/semgrep scan --config p/rust \
            --exclude-rule=rust.lang.security.unsafe-usage.unsafe-usage \
            --sarif --output semgrep.sarif .
      - name: Upload SARIF
        if: always()
        uses: github/codeql-action/upload-sarif@54f647b7e1bb85c95cddabcd46b0c578ec92bc1a # v4.36.3
        with:
          sarif_file: semgrep.sarif
          category: semgrep
