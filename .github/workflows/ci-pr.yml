name: ci-pr

# Full CI tier: runs on every PR to main and on pushes to main (post-merge
# safety net). `lint` (fmt + clippy), `test`, and `gfw-sim` run as separate jobs
# so failures stay localized and test / gfw-sim can be separate required checks.
# fmt is folded into the `lint` job (shares the same runner/checkout/toolchain),
# saving a whole rounded-up job-minute on every run.

on:
  pull_request:
    branches:
      - main
      - master
    paths-ignore:
      - '**.md'
      - 'ParallaX-DeepWiki/**'
      - 'DEPLOYMENT.md'
      - 'AGENTS.md'
      - 'README.md'
      - '.gitignore'
      - 'LICENSE*'
  push:
    branches:
      - main
      - master
    paths-ignore:
      - '**.md'
      - 'ParallaX-DeepWiki/**'
      - 'DEPLOYMENT.md'
      - 'AGENTS.md'
      - 'README.md'
      - '.gitignore'
      - 'LICENSE*'
  workflow_dispatch:

# Least-privilege default token: these jobs only read the repo to build/test.
# (Uses pull_request, not pull_request_target, so fork PRs already get a
# read-only token; this makes that explicit and covers push/dispatch runs.)
permissions:
  contents: read

concurrency:
  group: ci-pr-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  CARGO_INCREMENTAL: 0
  CARGO_NET_RETRY: 10
  RUSTUP_MAX_RETRIES: 10

jobs:
  lint:
    name: lint (fmt + clippy)
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        with:
          toolchain: stable
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
        with:
          shared-key: parallax-ci
          save-if: ${{ github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master' }}

      # fmt is cheap (~seconds) and rides on this job's already-paid checkout +
      # toolchain rather than spending a separate rounded-up job-minute.
      - name: cargo fmt --check
        run: cargo fmt --all -- --check
      - name: cargo clippy --all-targets -- -D warnings
        run: cargo clippy --all-targets --locked -- -D warnings

  test:
    name: test
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        with:
          toolchain: stable
      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
        with:
          shared-key: parallax-ci
          save-if: ${{ github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master' }}

      # Unit tests (lib + bins) + EVERY integration test target except
      # gfw_simulator (which has its own required check below). cargo runs ONLY the
      # targets named here, so the previous short list silently skipped
      # ja4_census_oracle, no_timeout_ratchet, gfw_sim_provenance,
      # etc.: the `--ignored` step below runs only #[ignore] tests, so their
      # non-ignored tests never executed in CI. Keep this list = `ls tests/*.rs`
      # minus gfw_simulator; any new tests/*.rs MUST be added here or it will never
      # run in CI.
      - name: cargo test (lib, bins, all integration tests except gfw_simulator)
        run: |
          cargo test --locked --no-fail-fast \
            --lib \
            --bins \
            --test chaos_liveness \
            --test ci_test_allowlist_complete \
            --test distinguisher_battery \
            --test gfw_live_replay \
            --test gfw_sim_provenance \
            --test ja4_census_oracle \
            --test mldsa_acvp \
            --test mldsa_differential \
            --test no_timeout_ratchet \
            --test prober_loop \
            --test safari_h2_parity_baseline \
            --test safari_h3_clienthello_0rtt_baseline \
            --test safari_h3_clienthello_baseline \
            --test safari_parity_baseline \
            --test splice_equivalence

      # Loopback integration tests are marked #[ignore] because they open
      # local TCP sockets. Run them serially so the OS doesn't get into a
      # weird state with bound ports.
      - name: cargo test -- --ignored (loopback integration)
        run: cargo test --locked --no-fail-fast -- --ignored --test-threads=1

  gfw-sim:
    name: gfw-sim
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        with:
          toolchain: stable
      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
        with:
          shared-key: parallax-ci
          save-if: ${{ github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master' }}

      - name: cargo test --test gfw_simulator
        run: cargo test --test gfw_simulator --locked --no-fail-fast
