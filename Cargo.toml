[package]
name = "parallax"
version = "0.1.0"
edition = "2021"
rust-version = "1.80"
description = "ParallaX censorship-resistant proxy protocol core"
license = "MIT"
default-run = "parallax"

[dependencies]
anyhow = "1"
base64 = "0.22"
chacha20poly1305 = { version = "0.10", features = ["alloc"] }
clap = { version = "4.5", features = ["derive", "env"] }
hkdf = "0.12"
hmac = "0.12"
libc = "0.2"
rand = "0.8"
pqcrypto-mlkem = "0.1"
pqcrypto-mldsa = "0.1.2"
pqcrypto-traits = "0.3"
# Stateful TLS camouflage patches rustls' ClientHello RNG slots; keep the
# patch version fixed until src/tls/safari26.rs tests pass against a new one.
rustls = { version = "=0.23.40", features = ["std", "aws_lc_rs"] }
serde = { version = "1", features = ["derive"] }
sha2 = "0.10"
subtle = "2.6"
thiserror = "2"
tokio = { version = "1.37", features = ["io-util", "macros", "net", "rt-multi-thread", "signal", "sync", "time"] }
toml = "0.8"
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter", "fmt"] }
x25519-dalek = { version = "2", features = ["static_secrets", "zeroize"] }
zeroize = { version = "1.7", features = ["derive"] }

[dev-dependencies]
tempfile = "3"
# Crypto used exclusively by the GFW simulator (tests/gfw_sim/):
# - aes / aes-gcm: RFC 9001 QUIC Initial header protection + AEAD-AES-128-GCM payload decryption
# - cipher: shared trait crate
# - md-5: JA3 fingerprint hash (matches the original JA3 spec)
aes = "0.8"
aes-gcm = "0.10"
cipher = "0.4"
md-5 = "0.10"

[profile.profiling]
inherits = "release"
debug = 2
split-debuginfo = "off"
strip = false
lto = "thin"
codegen-units = 1
