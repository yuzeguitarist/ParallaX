[package]
name = "parallax"
version = "0.1.0"
edition = "2021"
rust-version = "1.80"
description = "ParallaX censorship-resistant proxy protocol core"
license = "MIT"
default-run = "parallax"

[dependencies]
anyhow = "1"
base64 = "0.22"
chacha20poly1305 = { version = "0.10", features = ["alloc"] }
clap = { version = "4.5", features = ["derive", "env"] }
hkdf = "0.12"
hmac = "0.12"
rand = "0.8"
pqcrypto-mlkem = "0.1"
pqcrypto-traits = "0.3"
rustls = { version = "0.23", default-features = false, features = ["std", "ring"] }
serde = { version = "1", features = ["derive"] }
sha2 = "0.10"
subtle = "2.6"
thiserror = "2"
tokio = { version = "1.37", features = ["io-util", "macros", "net", "rt-multi-thread", "signal", "time"] }
toml = "0.8"
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter", "fmt"] }
x25519-dalek = { version = "2", features = ["static_secrets", "zeroize"] }
zeroize = { version = "1.7", features = ["derive"] }

[dev-dependencies]
tempfile = "3"
