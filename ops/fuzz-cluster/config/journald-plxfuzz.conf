# plxfuzz journald drop-in.
# Install to: /etc/systemd/journald.conf.d/plxfuzz.conf  (then `systemctl restart systemd-journald`).
#
# Why: the c-4 box has a 50 GB root FS that must survive a 15-day campaign.
# libFuzzer is chatty (-print_final_stats, reload churn, restarts) and every
# plx-fuzz@<target> unit streams to the journal. Uncapped, the journal alone
# can eat the disk over 15 days. 2G is plenty to keep a useful recent tail
# while leaving the bulk of the FS for the cargo target/ build dir.
# Per-unit stdout files (if any) are bounded separately by logrotate-plxfuzz.
[Journal]
SystemMaxUse=2G
